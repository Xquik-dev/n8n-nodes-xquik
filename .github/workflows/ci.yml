name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Audit Published Dependencies
        run: npm audit --omit=dev

      - name: Pack Check
        run: npm pack --dry-run
