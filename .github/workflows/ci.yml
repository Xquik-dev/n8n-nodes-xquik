name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Check License Metadata
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0

      - name: Set Up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "24.15.0"
          cache: npm

      - name: Set Up npm
        run: npm install --global npm@12.0.1 --ignore-scripts

      - name: Install
        run: npm ci --ignore-scripts

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Audit Published Dependencies
        run: npm audit --omit=dev

      - name: Audit Development Tooling
        run: npm audit --audit-level=high

      - name: Verify Registry Signatures
        run: npm audit signatures

      - name: Check Reproducible Package
        run: npm run check:reproducible

      - name: Pack Check
        run: npm pack --dry-run
