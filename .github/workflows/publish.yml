name: Publish to npm

on:
  release:
    types:
      - published

permissions: {}

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Verified Package
    if: github.event.release.prerelease == false
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read # Check out the immutable release tag.
      id-token: write # Exchange GitHub OIDC for short-lived npm access.
    steps:
      - name: Checkout Release
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Set Up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "24.15.0"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Set Up npm
        run: npm install --global npm@12.0.1 --ignore-scripts

      - name: Validate Release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          test "$RELEASE_TAG" = "v$(node -p "require('./package.json').version")"
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$(git rev-parse HEAD)"
          git fetch origin main --depth=1
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"

      - name: Install
        run: npm ci --ignore-scripts

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Audit Published Dependencies
        run: npm audit --omit=dev

      - name: Audit Development Tooling
        run: npm audit --audit-level=high

      - name: Verify Registry Signatures
        run: npm audit signatures

      - name: Check Reproducible Package
        run: npm run check:reproducible

      - name: Inspect Package
        run: npm pack --dry-run

      - name: Publish
        env:
          RELEASE_MODE: "true"
        run: npm publish --access public --provenance
